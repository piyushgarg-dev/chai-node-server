name: Deploy Nodejs code on ExCloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: QEMU
        uses: docker/setup-qemu-action@v4

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker Build and Push
        run: |
          docker build -t piyushgargdev/chaicode-node .
          docker push piyushgargdev/chaicode-node

      - name: Deploy on ExCloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 210.79.128.168
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            # Kill the existing docker container
            sudo docker rm -f chaicode-node || true

            # Again pull the fresh image from hub
            sudo docker pull piyushgargdev/chaicode-node

            # Run docker run -d -p 8000:8000 piyushgargdev/chaicode-node
            sudo docker run -d --name chaicode-node --restart unless-stopped -p 8000:8000 piyushgargdev/chaicode-node

            # Clean up old/unused images
            sudo docker image prune -f
